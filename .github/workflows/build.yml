name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Keystore
        run: |
          keytool -genkeypair -v \
            -keystore phxvpn.keystore \
            -alias phxvpn \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PHX VPN, OU=PHX, O=PHX, L=MM, S=MM, C=MM" \
            -storepass phxvpn123 \
            -keypass phxvpn123

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Sign and Organize APKs
        run: |
          BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | tail -1)
          mkdir -p final-apks
          
          # ထွက်လာသမျှ APK အားလုံးကို ရှာပြီး Sign လုပ်မယ်
          find ui/build/outputs/apk/release/ -name "*.apk" | while read apk; do
            # ဖိုင်နာမည်ထဲမှာ arm64 ဒါမှမဟုတ် armv7 ပါတာကို ရှာမယ်
            if [[ $apk == *"arm64-v8a"* ]]; then
              abi="arm64-v8a"
            elif [[ $apk == *"armeabi-v7a"* ]]; then
              abi="armeabi-v7a"
            else
              abi="unknown"
            fi
            
            if [ "$abi" != "unknown" ]; then
              ${BUILD_TOOLS}/apksigner sign \
                --ks phxvpn.keystore \
                --ks-key-alias phxvpn \
                --ks-pass pass:phxvpn123 \
                --key-pass pass:phxvpn123 \
                --out final-apks/PHX-VPN-${abi}.apk \
                "$apk"
            fi
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: PHX-VPN-Release
          path: final-apks/*.apk
