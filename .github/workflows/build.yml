name: Build Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Create Keystore
        run: |
          keytool -genkeypair -v \
            -keystore phxvpn.keystore \
            -alias phxvpn \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PHX VPN, OU=PHX, O=PHX, L=MM, S=MM, C=MM" \
            -storepass phxvpn123 \
            -keypass phxvpn123

      - name: Build with Gradle
        run: ./gradlew clean :ui:assembleRelease --no-daemon

      - name: Sign APKs
        run: |
          BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | tail -1)
          mkdir -p final-apks
          find ui/build/outputs/apk/release/ -name "*.apk" | while read apk; do
            abi=$(basename "$apk" | grep -oE 'arm64-v8a|armeabi-v7a' || echo "universal")
            ${BUILD_TOOLS}/apksigner sign \
              --ks phxvpn.keystore \
              --ks-key-alias phxvpn \
              --ks-pass pass:phxvpn123 \
              --key-pass pass:phxvpn123 \
              --out final-apks/PHX-VPN-${abi}.apk \
              "$apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "PHX-VPN Release #${{ github.run_number }}"
          files: final-apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
