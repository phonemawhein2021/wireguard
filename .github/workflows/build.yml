name: Build Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore phxvpn.keystore \
            -alias phxvpn \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=PHX VPN, OU=PHX, O=PHX, L=MM, S=MM, C=MM" \
            -storepass phxvpn123 \
            -keypass phxvpn123

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        run: |
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore phxvpn.keystore \
            -storepass phxvpn123 \
            -keypass phxvpn123 \
            ui/build/outputs/apk/release/ui-release-unsigned.apk \
            phxvpn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ui/build/outputs/apk/release/ui-release-unsigned.apk
