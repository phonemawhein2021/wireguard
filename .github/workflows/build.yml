      - name: Sign APKs
        run: |
          BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | tail -1)
          mkdir -p final-apks
          
          # Unsigned APK များကိုသာ ရှာဖွေပြီး sign လုပ်မည်
          find ui/build/outputs/apk/release/ -name "*.apk" | while read apk; do
            abi=$(basename "$apk" | grep -oE 'arm64-v8a|armeabi-v7a' || echo "universal")
            
            ${BUILD_TOOLS}/apksigner sign \
              --ks phxvpn.keystore \
              --ks-key-alias phxvpn \
              --ks-pass pass:phxvpn123 \
              --key-pass pass:phxvpn123 \
              --out final-apks/PHX-VPN-${abi}.apk \
              "$apk"
          done
